services:
  postgres:
    image: postgres:16-alpine
    container_name: leakshield-postgres
    environment:
      POSTGRES_USER: leakshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}
      POSTGRES_DB: leakshield
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leakshield -d leakshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: leakshield-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: leakshield-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://leakshield:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}@postgres:5432/leakshield
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://frontend:5173
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: leakshield-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_SERVERLESS_FEATURES: "false"
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:

