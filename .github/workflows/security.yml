name: Security and quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "19 3 * * 1"

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm --prefix frontend ci --ignore-scripts
      - run: npm audit --audit-level=low
      - run: npm --prefix frontend audit --audit-level=low
      - run: npm audit signatures
      - run: npm --prefix frontend audit signatures
      - run: npm test
      - run: npm --prefix frontend run build

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install uv==0.8.15
      - run: uv sync --frozen --all-extras
        working-directory: backend
      - run: uv run ruff check app tests
        working-directory: backend
      - run: uv run bandit -q -r app
        working-directory: backend
      - run: uv run pip-audit
        working-directory: backend
      - run: uv run pytest
        working-directory: backend
      - run: uv run python -m pip check
        working-directory: backend
